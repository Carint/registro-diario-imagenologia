<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Imagenología - Hospital Dr. Juan Manuel Gálvez</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-body: #f8fafc;
            /* slate-50 */
            --card-bg: #ffffff;
            --text-main: #0f172a;
            /* slate-900 */
            --text-muted: #64748b;
            /* slate-500 */
            --text-label: #334155;
            /* slate-700 */
            --border-color: #e2e8f0;
            /* slate-200 */
            --border-focus: #3b82f6;
            /* blue-500 */
            --ring-focus: rgba(59, 130, 246, 0.5);
            --primary: #2563eb;
            /* blue-600 */
            --primary-hover: #1d4ed8;
            --success: #16a34a;
            /* green-600 */
            --success-hover: #15803d;
            --danger: #ef4444;
            /* red-500 */
            --danger-hover: #dc2626;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
        }

        /* ESTILOS GENERALES */
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 20px;
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 100%;
            padding: 0 24px;
            margin: auto;
            display: flex;
            gap: 24px;
            align-items: flex-start;
            flex-direction: row-reverse;
        }

        .left-panel {
            flex: 0 0 30%;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .right-panel {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        @media screen and (max-width: 1024px) {
            .container {
                flex-direction: column;
            }

            .left-panel {
                flex: none;
                max-width: 100%;
            }
        }

        .section-card {
            background: var(--card-bg);
            padding: 24px;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            margin-bottom: 24px;
            border: 1px solid var(--border-color);
            transition: box-shadow 0.2s ease-in-out;
        }

        h2,
        h3 {
            color: var(--text-main);
            text-align: center;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
        }

        hr {
            border: 0;
            border-top: 1px solid var(--border-color);
            margin: 24px 0;
        }

        /* FORMULARIO DE ENTRADA */
        .header-inputs {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .insumos-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            min-width: 0;
        }

        label {
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--text-label);
        }

        input[type="text"],
        input[type="number"],
        input[type="date"],
        select,
        textarea {
            width: 100%;
            box-sizing: border-box;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 0.875rem;
            font-family: inherit;
            color: var(--text-main);
            background-color: var(--card-bg);
            box-shadow: var(--shadow-sm);
            transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
            outline: none;
        }

        input[type="checkbox"] {
            width: 1rem;
            height: 1rem;
            border-radius: 0.25rem;
            accent-color: var(--primary);
        }

        input:focus,
        select:focus,
        textarea:focus {
            border-color: var(--border-focus);
            box-shadow: 0 0 0 3px var(--ring-focus);
        }

        textarea {
            resize: vertical;
        }

        .form-columns {
            display: grid !important;
            grid-template-columns: repeat(3, 1fr) !important;
            gap: 24px !important;
            align-items: stretch;
        }

        .form-column {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        button {
            padding: 0.625rem 1.25rem;
            background-color: var(--success);
            color: white;
            border: none;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.875rem;
            font-weight: 600;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--success-hover);
            transform: translateY(-1px);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-print {
            background-color: var(--primary);
            margin-top: 16px;
            width: 100%;
            font-size: 1rem;
            padding: 0.75rem 1.5rem;
        }

        .btn-print:hover {
            background-color: var(--primary-hover);
        }

        .btn-danger {
            background-color: var(--danger) !important;
        }

        .btn-danger:hover {
            background-color: var(--danger-hover) !important;
        }

        /* TABLA Y FORMATO OFICIAL */
        .header-oficial {
            display: none;
            text-align: center;
            margin-bottom: 10px;
        }

        .header-oficial h1 {
            font-size: 18pt;
            margin: 0;
            color: black;
        }

        .header-oficial p {
            font-size: 12pt;
            margin: 2px 0;
            color: black;
        }

        .tabla-reporte {
            width: 100%;
            border-collapse: collapse;
            margin-top: 16px;
            background-color: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
        }

        .tabla-reporte th,
        .tabla-reporte td {
            border: 1px solid var(--border-color);
            padding: 6px 10px;
            font-size: 0.75rem;
            /* ~12px */
            text-align: center;
        }

        .tabla-reporte th {
            background-color: var(--bg-body);
            font-weight: 600;
            color: var(--text-label);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.6875rem;
            /* ~11px */
        }

        /* CONFIGURACIÓN DE IMPRESIÓN */
        @media print {
            body {
                margin: 0;
                background: white;
                color: black;
            }

            .container {
                box-shadow: none;
                max-width: 100%;
                padding: 0;
            }

            .section-card {
                box-shadow: none;
                border: none;
                padding: 0;
                margin: 0;
            }

            .no-print-section,
            .btn-print,
            .left-panel,
            h2 {
                display: none !important;
            }

            .header-oficial {
                display: flex;
                flex-direction: column;
                margin-bottom: 5px;
            }

            .header-oficial h1 {
                font-size: 14pt;
                margin: 0;
                color: black;
            }

            .header-oficial p {
                font-size: 9pt;
                margin: 0;
                color: black;
            }

            #datosCabeceraImpresion {
                font-size: 9pt !important;
                margin-top: 5px !important;
                margin-bottom: 5px !important;
            }

            .no-print {
                display: none !important;
            }

            @page {
                size: 330mm 216mm;
                margin: 0.5cm;
            }

            .tabla-reporte {
                font-size: 8pt;
                width: 100%;
                box-shadow: none;
            }

            .tabla-reporte th,
            .tabla-reporte td {
                padding: 2px;
                border: 1px solid black;
                color: black;
            }

            .tabla-reporte th {
                background-color: transparent;
                text-transform: none;
                letter-spacing: normal;
                font-size: 8pt;
            }

            .text-left-print {
                text-align: left !important;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <!-- COLUMNA IZQUIERDA (25%) -->
        <div class="left-panel">
            <div class="section-card no-print-section form-column" id="formPaciente" style="margin-bottom: 0;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div class="form-group">
                        <label>Sala de Procedencia:</label>
                        <select id="pSala"></select>
                    </div>
                    <div class="form-group">
                        <label>Identidad:</label>
                        <input type="text" id="pIdentidad" placeholder="0000-0000-00000">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Nombre del Paciente:</label>
                        <input type="text" id="pNombre">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Estudio Realizado:</label>
                        <textarea id="pEstudio" rows="2"></textarea>
                    </div>
                    <div class="form-group">
                        <label>Edad:</label>
                        <div style="display: flex; gap: 10px;">
                            <input type="number" id="pEdad" style="flex: 1;">
                            <select id="pUnidadEdad" style="width: 120px;">
                                <option value="Años">Años</option>
                                <option value="Meses">Meses</option>
                                <option value="Días">Días</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Médico Solicitante:</label>
                        <input type="text" id="pMedico">
                    </div>
                </div>

                <hr style="margin: 12px 0;">
                <div class="insumos-grid" style="grid-template-columns: repeat(3, 1fr);">
                    <div class="form-group"><label style="font-size: 0.75rem;">14x17:</label><input type="number"
                            id="p17" value="0"></div>
                    <div class="form-group"><label style="font-size: 0.75rem;">10x12:</label><input type="number"
                            id="p10" value="0"></div>
                    <div class="form-group"><label style="font-size: 0.75rem;">8x10:</label><input type="number" id="p8"
                            value="0"></div>
                </div>
                <hr style="margin: 12px 0;">

                <div class="form-group">
                    <label>Observaciones:</label>
                    <textarea id="pObs" rows="2"></textarea>
                </div>

                <div class="form-group" style="flex-direction: row; align-items: center; gap: 8px; margin-top: 8px;">
                    <input type="checkbox" id="chkMayusculas" style="cursor: pointer;" checked>
                    <label for="chkMayusculas" style="margin: 0; cursor: pointer;">Texto en MAYÚSCULAS</label>
                </div>

                <div style="display: flex; gap: 10px; margin-top: 12px;">
                    <button id="btnAgregar" onclick="agregarFila()" style="flex: 1;">+ Agregar Paciente</button>
                    <button id="btnCancelarEdit" class="btn-danger" onclick="cancelarEdicion()" style="display: none; padding: 0.625rem;" title="Cancelar Edición">
                        <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16" style="margin-top: 2px;">
                            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>

        <!-- COLUMNA DERECHA (70%) -->
        <div class="right-panel">
            <div class="section-card" style="margin-bottom: 0;">
                <h2 style="text-align: left; margin-bottom: 1.5rem; display: flex; align-items: center; justify-content: space-between;">
                    Registro Diario
                    <span id="totalRegistros" style="font-size: 1rem; font-weight: 500; color: var(--text-muted); background: var(--border-color); padding: 4px 12px; border-radius: 999px;">Total: 0</span>
                </h2>
                <!-- Acciones superior derecha -->
                <div class="no-print"
                    style="display: flex; gap: 16px; align-items: flex-end; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 1px solid var(--border-color); flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 120px;">
                        <label>Fecha:</label>
                        <input type="date" id="fechaGral">
                    </div>
                    <div class="form-group" style="flex: 1; min-width: 120px;">
                        <label>Turno:</label>
                        <select id="turnoGral"></select>
                    </div>
                    <div class="form-group" style="flex: 1.5; min-width: 150px;">
                        <label>Técnico Responsable:</label>
                        <select id="tecnicoGral"></select>
                    </div>
                    <div style="display: flex; gap: 8px;">
                        <button class="btn-danger no-print" onclick="borrarTodos()"
                            style="margin-top: 0; padding: 0.5rem 1.25rem; font-size: 0.875rem; width: auto; display: flex; align-items: center; gap: 8px;" title="Borrar todos los registros">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/>
                                <path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z"/>
                            </svg>
                            Borrar Registros
                        </button>
                        <button class="btn-print" onclick="imprimirReporte()"
                            style="margin-top: 0; padding: 0.5rem 1.25rem; font-size: 0.875rem; width: auto; display: flex; align-items: center; gap: 8px;">
                            <svg width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                                <path
                                    d="M5 1a2 2 0 0 0-2 2v1h10V3a2 2 0 0 0-2-2H5zm6 8H5a1 1 0 0 0-1 1v3a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1v-3a1 1 0 0 0-1-1z" />
                                <path
                                    d="M0 7a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v3a2 2 0 0 1-2 2h-1v-2a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v2H2a2 2 0 0 1-2-2V7zm2.5 1a.5.5 0 1 0 0-1 .5.5 0 0 0 0 1z" />
                            </svg>
                            Imprimir Cuadro
                        </button>
                    </div>
                </div>

                <table class="tabla-reporte" id="tablaDatos">
                    <thead>
                        <tr>
                            <th colspan="16" style="border: none; background: white; padding: 0;">
                                <div class="header-oficial" style="position: relative;">
                                    <p>GOBIERNO DE LA REPÚBLICA DE HONDURAS</p>
                                    <h1>HOSPITAL DR. JUAN MANUEL GÁLVEZ</h1>
                                    <p>GRACIAS, LEMPIRA</p>
                                    <p><strong>DEPARTAMENTO DE IMAGENOLOGÍA</strong></p>
                                    <p id="datosCabeceraImpresion"></p>
                                </div>
                            </th>
                        </tr>
                        <tr>
                            <th rowspan="2" class="no-print" style="width: 30px;">Acción</th>
                            <th rowspan="2" style="width: 30px;">#</th>
                            <th rowspan="2">Sala</th>
                            <th rowspan="2">Identidad</th>
                            <th rowspan="2">Nombre del Paciente</th>
                            <th rowspan="2">Estudio Realizado</th>
                            <th rowspan="2">Edad</th>
                            <th rowspan="2">Médico</th>
                            <th rowspan="2">Tec.</th>
                            <th rowspan="2">Observaciones</th>
                            <th colspan="3">N° de Placas</th>
                        </tr>
                        <tr>
                            <th>17</th>
                            <th>10</th>
                            <th>8</th>
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. DATOS QUEMADOS (PARAMETRIZADOS)
        const TECNICOS = [
            "Carlos Interiano",
            "Técnico 2",
            "Técnico 3"
        ];
        const TURNOS = ["Turno A", "Turno B", "Turno C"];
        const SALAS = [
            "Emergencia",
            "Pediatria",
            "Lactantes",
            "Neonatos",
            "Ginecología",
            "Cirugia de Hombres",
            "Cirugia de Mujeres",
            "Medicina de Hombres",
            "Medicina de Mujeres",
            "Ortopedia de Mujeres",
            "Ortopedia de Hombres",
            "Sala de Operaciones",
            "Sala de Recuperación",
            "Consulta Externa General",
            "Consulta Externa de Privada",
            "Consulta Externa de Ginecología",
            "Consulta Externa de Medicina Interna",
            "Consulta Externa de Cirugia General",
            "Consulta Externa de Peditria",
            "Consulta Externa de ORL",
            "Consulta Externa de Otopedia"
        ];

        // 2. INICIALIZAR SELECTS
        window.onload = () => {
            document.getElementById('fechaGral').valueAsDate = new Date();
            llenarSelect('turnoGral', TURNOS);
            llenarSelect('tecnicoGral', TECNICOS);
            llenarSelect('pSala', SALAS);
            renderizarTabla();
        };

        function llenarSelect(id, array) {
            const sel = document.getElementById(id);
            array.forEach(item => {
                let opt = document.createElement('option');
                opt.value = item;
                opt.innerHTML = item;
                sel.appendChild(opt);
            });
        }

        // 3. LÓGICA DE AGREGADO
        let registros = JSON.parse(localStorage.getItem('registros')) || [];
        let editIndex = -1;

        function guardarRegistros() {
            localStorage.setItem('registros', JSON.stringify(registros));
            document.getElementById('totalRegistros').innerText = `Total: ${registros.length}`;
        }

        function formatText(text) {
            if (!text) return "";
            if (document.getElementById('chkMayusculas').checked) {
                return text.toUpperCase();
            } else {
                return text.toLowerCase().split(' ').map(s => s.charAt(0).toUpperCase() + s.substring(1)).join(' ');
            }
        }

        function agregarFila() {
            const valEdad = document.getElementById('pEdad').value;
            const unidadEdad = document.getElementById('pUnidadEdad').value;
            const edadFormateada = valEdad ? `${valEdad} ${unidadEdad}` : "";

            const registro = {
                sala: document.getElementById('pSala').value,
                identidad: document.getElementById('pIdentidad').value,
                nombre: formatText(document.getElementById('pNombre').value),
                estudio: formatText(document.getElementById('pEstudio').value),
                edad: edadFormateada,
                medico: formatText(document.getElementById('pMedico').value),
                tecnico: document.getElementById('tecnicoGral').value, // Se toma el del turno
                obs: formatText(document.getElementById('pObs').value),
                p17: document.getElementById('p17').value,
                p10: document.getElementById('p10').value,
                p8: document.getElementById('p8').value
            };

            if (editIndex >= 0) {
                registros[editIndex] = registro;
                cancelarEdicion(); // Resetear el estado de edición y UI
            } else {
                registros.push(registro);
            }
            
            guardarRegistros();
            renderizarTabla();
            resetForm();
        }

        function borrarFila(index) {
            if(confirm('¿Desea borrar este registro?')) {
                registros.splice(index, 1);
                if (editIndex === index) {
                    cancelarEdicion();
                } else if (editIndex > index) {
                    editIndex--; // Adjust index if a previous row is deleted
                }
                guardarRegistros();
                renderizarTabla();
            }
        }

        function borrarTodos() {
            if (registros.length === 0) return;
            if(confirm('¿Está seguro de que desea borrar todos los registros? Esta acción no se puede deshacer.')) {
                registros = [];
                cancelarEdicion();
                guardarRegistros();
                renderizarTabla();
            }
        }

        function editarFila(index) {
            const r = registros[index];
            document.getElementById('pSala').value = r.sala || '';
            document.getElementById('pIdentidad').value = r.identidad || '';
            document.getElementById('pNombre').value = r.nombre || '';
            document.getElementById('pEstudio').value = r.estudio || '';
            
            if (r.edad) {
                const parts = r.edad.split(' ');
                document.getElementById('pEdad').value = parts[0] || '';
                document.getElementById('pUnidadEdad').value = parts[1] || 'Años';
            } else {
                document.getElementById('pEdad').value = '';
                document.getElementById('pUnidadEdad').value = 'Años';
            }
            
            document.getElementById('pMedico').value = r.medico || '';
            document.getElementById('tecnicoGral').value = r.tecnico || document.getElementById('tecnicoGral').options[0].value;
            document.getElementById('pObs').value = r.obs || '';
            document.getElementById('p17').value = r.p17 || '0';
            document.getElementById('p10').value = r.p10 || '0';
            document.getElementById('p8').value = r.p8 || '0';
            
            editIndex = index;
            const btn = document.getElementById('btnAgregar');
            btn.innerText = 'Actualizar Paciente';
            btn.style.backgroundColor = 'var(--primary)';
            document.getElementById('btnCancelarEdit').style.display = 'block';
            
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        function cancelarEdicion() {
            editIndex = -1;
            const btn = document.getElementById('btnAgregar');
            btn.innerText = '+ Agregar Paciente';
            btn.style.backgroundColor = 'var(--success)';
            document.getElementById('btnCancelarEdit').style.display = 'none';
            resetForm();
        }

        function renderizarTabla() {
            const tbody = document.querySelector('#tablaDatos tbody');
            tbody.innerHTML = "";
            
            // Actualizar total (por si acaso)
            document.getElementById('totalRegistros').innerText = `Total: ${registros.length}`;
            
            registros.forEach((r, index) => {
                const fila = `<tr>
                <td class="no-print" style="white-space: nowrap; padding: 4px;">
                    <button onclick="editarFila(${index})" style="background-color: var(--primary); padding: 0.25rem 0.4rem; font-size: 0.75rem; margin-right: 2px;" title="Editar registro">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M12.146.146a.5.5 0 0 1 .708 0l3 3a.5.5 0 0 1 0 .708l-10 10a.5.5 0 0 1-.168.11l-5 2a.5.5 0 0 1-.65-.65l2-5a.5.5 0 0 1 .11-.168l10-10zM11.207 2.5 13.5 4.793 14.793 3.5 12.5 1.207 11.207 2.5zm1.586 3L10.5 3.207 4 9.707V10h.5a.5.5 0 0 1 .5.5v.5h.5a.5.5 0 0 1 .5.5v.5h.293l6.5-6.5zm-9.761 5.175-.106.106-1.528 3.821 3.821-1.528.106-.106A.5.5 0 0 1 5 12.5V12h-.5a.5.5 0 0 1-.5-.5V11h-.5a.5.5 0 0 1-.468-.325z"/>
                        </svg>
                    </button>
                    <button onclick="borrarFila(${index})" class="btn-danger" style="padding: 0.25rem 0.4rem; font-size: 0.75rem;" title="Borrar registro">
                        <svg width="12" height="12" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M4.646 4.646a.5.5 0 0 1 .708 0L8 7.293l2.646-2.647a.5.5 0 0 1 .708.708L8.707 8l2.647 2.646a.5.5 0 0 1-.708.708L8 8.707l-2.646 2.647a.5.5 0 0 1-.708-.708L7.293 8 4.646 5.354a.5.5 0 0 1 0-.708z"/>
                        </svg>
                    </button>
                </td>
                <td>${index + 1}</td>
                <td class="text-left-print">${r.sala}</td>
                <td class="text-left-print">${r.identidad}</td>
                <td class="text-left-print">${r.nombre}</td>
                <td class="text-left-print">${r.estudio}</td>
                <td>${r.edad}</td>
                <td class="text-left-print">${r.medico}</td>
                <td class="text-left-print">${r.tecnico}</td>
                <td class="text-left-print">${r.obs}</td>
                <td>${r.p17}</td>
                <td>${r.p10}</td>
                <td>${r.p8}</td>
            </tr>`;
                tbody.innerHTML += fila;
            });
        }

        function resetForm() {
            // Limpia solo campos de paciente, mantiene placas en 0
            document.getElementById('pIdentidad').value = "";
            document.getElementById('pNombre').value = "";
            document.getElementById('pEstudio').value = "";
            document.getElementById('pEdad').value = "";
            document.getElementById('pUnidadEdad').value = "Años";
            document.getElementById('pMedico').value = "";
            document.getElementById('pObs').value = "";
            document.getElementById('p17').value = "0";
            document.getElementById('p10').value = "0";
            document.getElementById('p8').value = "0";

            // Enfocar automáticamente en "Identidad" para seguir escribiendo rápido
            document.getElementById('pIdentidad').focus();
        }

        function imprimirReporte() {
            const fecha = document.getElementById('fechaGral').value;
            const turno = document.getElementById('turnoGral').value;

            document.getElementById('datosCabeceraImpresion').innerHTML =
                `FECHA: ${fecha} | TURNO: ${turno} | CÓDIGO: AX-GC-SAD-IMAG-003-B`;

            window.print();
        }
    </script>

</body>

</html>
